# Docker Compose for local development and testing
version: '3.8'

services:
  # Backend API
  backend:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: robo-gig-backend
    ports:
      - "3001:3001"
    environment:
      NODE_ENV: development
      PORT: 3001
      # Database - Use your Azure PostgreSQL or local
      DATABASE_URL: ${DATABASE_URL}
      # Azure Blob Storage
      AZURE_STORAGE_CONNECTION_STRING: ${AZURE_STORAGE_CONNECTION_STRING}
      AZURE_STORAGE_CONTAINER_NAME: ${AZURE_STORAGE_CONTAINER_NAME:-robo-root-uploads}
      # JWT Secrets
      JWT_SECRET: ${JWT_SECRET:-development-secret-key-minimum-32-characters}
      JWT_REFRESH_SECRET: ${JWT_REFRESH_SECRET:-development-refresh-key-minimum-32-chars}
      # Email (optional for local)
      SENDGRID_API_KEY: ${SENDGRID_API_KEY}
      EMAIL_FROM: ${EMAIL_FROM:-noreply@robogig.com}
      # CORS
      FRONTEND_URL: ${FRONTEND_URL:-http://localhost:3000}
    volumes:
      # Mount for hot reload (only in development)
      - ./src:/app/src
      - ./prisma:/app/prisma
    depends_on:
      - db
    restart: unless-stopped
    networks:
      - robo-gig-network
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:3001/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s

  # PostgreSQL database (optional - for local development)
  db:
    image: postgres:16-alpine
    container_name: robo-gig-db
    ports:
      - "5432:5432"
    environment:
      POSTGRES_USER: ${DB_USER:-postgres}
      POSTGRES_PASSWORD: ${DB_PASSWORD:-postgres}
      POSTGRES_DB: ${DB_NAME:-robogig}
    volumes:
      - postgres-data:/var/lib/postgresql/data
    restart: unless-stopped
    networks:
      - robo-gig-network
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 10s
      timeout: 5s
      retries: 5

volumes:
  postgres-data:
    driver: local

networks:
  robo-gig-network:
    driver: bridge
